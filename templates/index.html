<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AirSense AI</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#22c55e">


    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <h1>🌫️ AirSense <span>AI</span></h1>
    <p class="subtitle">Explainable Air Quality Intelligence</p>

    <!-- INPUT CARD -->
    <div class="card">
        <label for="city">Select City</label>
        <select id="city">
            <option value="">Choose a city</option>
            <option>Delhi</option>
            <option>Mumbai</option>
            <option>Bengaluru</option>
            <option>Chennai</option>
            <option>Kolkata</option>
            <option>Hyderabad</option>
        </select>

        <button onclick="predictAQI()">🔍 Analyze AQI</button>
    </div>

    <!-- RESULT POPUP AREA (SCROLL INSIDE ONLY) -->
    <div id="result" class="result hidden">
        <!-- Dynamic content from JS -->
    </div>

    <!-- FOOTER -->
    <footer>AI • Health • Environment</footer>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js")
        .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
